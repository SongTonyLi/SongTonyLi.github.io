name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install and build claude-code slides
        working-directory: claude-code
        run: |
          bun install
          bun run build

      - name: Assemble site
        run: |
          mkdir -p _site/claude-code
          # Copy static top-level content
          cp -r CS180 _site/CS180 2>/dev/null || true
          cp -r Presentations _site/Presentations 2>/dev/null || true
          cp README.md _site/ 2>/dev/null || true
          # Copy built Vite app
          cp -r claude-code/dist/* _site/claude-code/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
